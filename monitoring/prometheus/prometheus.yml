global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Simpan jangka panjang ke VictoriaMetrics
remote_write:
  - url: "http://victoriametrics:8428/api/v1/write"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  # Node exporter (dari generated targets)
  - job_name: "node_exporter"
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/node_exporter.json
        refresh_interval: 30s

  # cAdvisor services (dari generated targets)
  - job_name: "cadvisor_services"
    scrape_interval: 15s
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/cadvisor_services.json
        refresh_interval: 30s

  # cAdvisor central (opsional)
  - job_name: "cadvisor_central"
    scrape_interval: 15s
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/cadvisor_central.json
        refresh_interval: 30s

  # Blackbox HTTP (targets adalah URL; blackbox tetap di replacement)
  - job_name: "blackbox_http"
    scrape_interval: 15s
    metrics_path: /probe
    params:
      module: [http_2xx_15s]
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/blackbox_http.json
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "blackbox:9115"

  # Blackbox TCP (targets adalah host:port; blackbox tetap di replacement)
  - job_name: "blackbox_tcp"
    scrape_interval: 15s
    metrics_path: /probe
    params:
      module: [tcp_connect]
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/blackbox_tcp.json
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "blackbox:9115"